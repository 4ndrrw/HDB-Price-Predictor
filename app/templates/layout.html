<!DOCTYPE html>
<html lang="en">
<style>[x-cloak] { display: none !important; }</style>
<script defer src="https://unpkg.com/alpinejs@3.12.0/dist/cdn.min.js"></script>
<head>
  <meta charset="UTF-8">
  <title>{{ title or "Property Price ML" }}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Global styling + animation utilities -->
  <style>
    :root {
      color-scheme: light;
      --ease-soft: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "Segoe UI", sans-serif;
    }

    /* Shared animation utilities */
    .animate-fade-up {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s var(--ease-soft) forwards;
    }
    .animate-fade {
      opacity: 0;
      animation: fadeIn 0.75s var(--ease-soft) forwards;
    }
    .animate-pop {
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      animation: popIn 0.65s var(--ease-soft) forwards;
    }
    .animate-delay-1 { animation-delay: 0.12s; }
    .animate-delay-2 { animation-delay: 0.24s; }
    .animate-delay-3 { animation-delay: 0.36s; }
    .animate-delay-4 { animation-delay: 0.48s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tableEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* NAV: entrance + scroll-state */
    nav.primary-nav {
      opacity: 0;
      animation: fadeDown 0.6s var(--ease-soft) forwards;
      transition:
        box-shadow 220ms var(--ease-soft),
        background-color 220ms var(--ease-soft),
        border-color 220ms var(--ease-soft);
    }
    nav.primary-nav.nav-scrolled .nav-pill {
      background-color: rgba(255, 255, 255, 0.92);
      border-color: rgba(209, 213, 219, 0.9);
      box-shadow: 0 14px 40px -28px rgba(15, 23, 42, 0.30);
      backdrop-filter: blur(28px);
    }

    nav.primary-nav a {
      position: relative;
    }
    nav.primary-nav a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #0f172a;
      transition: width 200ms var(--ease-soft), left 200ms var(--ease-soft);
    }
    nav.primary-nav a:hover::after {
      width: 100%;
      left: 0;
    }

    /* Scroll reveal (for sections/cards) */
    .reveal-on-scroll {
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 700ms var(--ease-soft),
        transform 700ms var(--ease-soft);
    }
    .reveal-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-gradient-to-b from-gray-50 via-white to-white text-gray-900 min-h-screen antialiased">

  <!-- ================================
       TRANSPARENT GLASS NAVBAR
  ================================= -->
  <nav class="primary-nav w-full mt-6">
    <div class="max-w-[90rem] mx-auto px-4">

      <!-- Glass pill wrapper -->
      <div
        class="nav-pill flex items-center justify-between
               px-8 py-3 rounded-full border border-gray-200/70
               bg-white/60 backdrop-blur-xl
               shadow-[0_14px_40px_-28px_rgba(15,23,42,0.35)]
               transition-all duration-300">
        
        <!-- Logo (LEFT) -->
        <div class="text-lg font-semibold tracking-tight">
          PPML
        </div>

        <!-- Nav Links (RIGHT) -->
        <div class="flex items-center space-x-8 text-base font-medium">

          <a href="/" class="text-gray-700 hover:text-black transition-colors">
            Home
          </a>

          <a href="/predict" class="text-gray-700 hover:text-black transition-colors">
            Predict
          </a>

          {% if session.get("user_id") %}
            <a
              href="/logout"
              class="px-3.5 py-2 bg-black text-white rounded-md shadow-sm
                     hover:-translate-y-0.5 hover:shadow-lg
                     active:scale-[0.97] transition-all duration-200"
            >
              Log Out
            </a>
          {% else %}
            <a href="/login" class="text-gray-700 hover:text-black transition-colors">
              Login
            </a>
          {% endif %}

        </div>
      </div>

    </div>
  </nav>


  <!-- PAGE CONTENT -->
  <main class="max-w-[95rem] mx-auto px-8 py-14">
    {% block content %}{% endblock %}
  </main>


  <!-- Navbar scroll behaviour -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const nav = document.querySelector("nav.primary-nav");
      const onScroll = () => {
        if (window.scrollY > 10) nav.classList.add("nav-scrolled");
        else nav.classList.remove("nav-scrolled");
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();

      // Reveal animations
      const revealEls = document.querySelectorAll(".reveal-on-scroll");
      if ("IntersectionObserver" in window) {
        const obs = new IntersectionObserver(
          entries => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                obs.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.15 }
        );
        revealEls.forEach(el => obs.observe(el));
      } else {
        revealEls.forEach(el => el.classList.add("is-visible"));
      }
    });
  </script>
</body>
</html>
