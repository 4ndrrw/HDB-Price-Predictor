<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Property Price ML" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-gray-50 to-white text-gray-900 min-h-screen antialiased">

    <!-- Top Navbar -->
    <nav class="w-full border-b border-gray-200 bg-white/90 backdrop-blur">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4">
            <!-- Logo -->
            <div class="text-xl font-semibold tracking-tight">PPML</div>

            <!-- Right Links -->
            <div class="flex items-center space-x-6 text-sm font-medium">
                <a href="/" class="text-gray-700 hover:text-black transition-colors">Home</a>
                <a href="/predict" class="text-gray-700 hover:text-black transition-colors">Predict</a>

                {% if session.get("user_id") %}
                    <a href="/logout" class="px-3 py-1.5 bg-black text-white rounded-md shadow-sm hover:-translate-y-0.5 transition">
                        Log Out
                    </a>
                {% else %}
                    <a href="/login" class="text-gray-700 hover:text-black transition-colors">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
