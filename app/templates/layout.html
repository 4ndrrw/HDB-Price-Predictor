<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "Property Price ML" }}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Global styling + animation utilities -->
  <style>
    :root {
      color-scheme: light;
      --ease-soft: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
        "SF Pro Text", "Segoe UI", sans-serif;
    }

    /* Shared animation utilities */
    .animate-fade-up {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s var(--ease-soft) forwards;
    }
    .animate-fade {
      opacity: 0;
      animation: fadeIn 0.75s var(--ease-soft) forwards;
    }
    .animate-pop {
      opacity: 0;
      transform: translateY(8px) scale(0.97);
      animation: popIn 0.65s var(--ease-soft) forwards;
    }
    .animate-delay-1 { animation-delay: 0.12s; }
    .animate-delay-2 { animation-delay: 0.24s; }
    .animate-delay-3 { animation-delay: 0.36s; }
    .animate-delay-4 { animation-delay: 0.48s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tableEnter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes rowHighlight {
      0%   { box-shadow: inset 0 0 0 9999px rgba(16, 185, 129, 0.08); }
      100% { box-shadow: inset 0 0 0 9999px rgba(16, 185, 129, 0); }
    }

    /* Reusable elevated card */
    .card-elevated {
      transition:
        transform 260ms var(--ease-soft),
        box-shadow 260ms var(--ease-soft),
        border-color 260ms var(--ease-soft),
        background-color 260ms var(--ease-soft);
    }
    .card-elevated:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 80px -48px rgba(15, 23, 42, 0.55);
      border-color: rgba(15, 23, 42, 0.12);
      background-color: rgba(255, 255, 255, 0.98);
    }

    /* Navbar entrance + underline + scroll state */
    nav.primary-nav {
      opacity: 0;
      animation: fadeDown 0.6s var(--ease-soft) forwards;
      transition: box-shadow 220ms var(--ease-soft),
                  background-color 220ms var(--ease-soft),
                  border-color 220ms var(--ease-soft);
    }
    nav.primary-nav a {
      position: relative;
    }
    nav.primary-nav a::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #0f172a;
      transition: width 200ms var(--ease-soft), left 200ms var(--ease-soft);
    }
    nav.primary-nav a:hover::after {
      width: 100%;
      left: 0;
    }
    nav.primary-nav.nav-scrolled {
      background-color: rgba(255, 255, 255, 0.96);
      box-shadow: 0 14px 40px -28px rgba(15, 23, 42, 0.45);
      border-color: rgba(209, 213, 219, 0.9);
    }

    /* Scroll reveal (for sections/cards) */
    .reveal-on-scroll {
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 700ms var(--ease-soft),
        transform 700ms var(--ease-soft);
    }
    .reveal-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-gradient-to-b from-gray-50 via-white to-white text-gray-900 min-h-screen antialiased">

  <!-- Top Navbar -->
  <nav class="primary-nav w-full border-b border-gray-200 bg-white/80 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-5">
      <!-- Logo -->
      <div class="text-lg font-semibold tracking-tight">
        PPML
      </div>

      <!-- Right Links -->
      <div class="flex items-center space-x-7 text-sm font-medium">
        <a href="/" class="text-gray-700 hover:text-black transition-colors">Home</a>
        <a href="/predict" class="text-gray-700 hover:text-black transition-colors">Predict</a>

        {% if session.get("user_id") %}
          <a href="/logout"
             class="px-3.5 py-2 bg-black text-white rounded-md shadow-sm hover:-translate-y-0.5 hover:shadow-lg active:scale-[0.97] transition-all duration-200">
            Log Out
          </a>
        {% else %}
          <a href="/login" class="text-gray-700 hover:text-black transition-colors">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="max-w-7xl mx-auto px-8 py-14">
    {% block content %}{% endblock %}
  </main>

  <!-- Scroll + navbar behaviour -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const nav = document.querySelector("nav.primary-nav");
      const revealEls = document.querySelectorAll(".reveal-on-scroll");

      const onScroll = () => {
        if (window.scrollY > 10) {
          nav.classList.add("nav-scrolled");
        } else {
          nav.classList.remove("nav-scrolled");
        }
      };
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();

      if ("IntersectionObserver" in window) {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.15 }
        );
        revealEls.forEach((el) => observer.observe(el));
      } else {
        // Fallback: just show all
        revealEls.forEach((el) => el.classList.add("is-visible"));
      }
    });
  </script>
</body>
</html>
