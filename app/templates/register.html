{% extends "layout.html" %}
{% block content %}

<div class="flex justify-center">
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-sm p-8 space-y-6">
        <div class="space-y-2 text-center">
            <p class="text-xs font-semibold uppercase tracking-[0.25em] text-gray-500">Create access</p>
            <h2 class="text-2xl font-semibold">Register</h2>
            <p class="text-sm text-gray-600">Set up your account to save and revisit predictions.</p>
        </div>

        <form method="POST" class="space-y-4">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-700">Username</label>
                <input name="username" required class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm focus:border-black focus:outline-none focus:ring-2 focus:ring-black/10 transition" />
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-700">Password</label>
                <input name="password" type="password" required class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm focus:border-black focus:outline-none focus:ring-2 focus:ring-black/10 transition" />
            </div>

            <button class="w-full bg-black text-white py-2.5 rounded-md text-sm font-medium shadow-sm transition hover:-translate-y-0.5">Register</button>
        </form>

        <div class="text-center space-y-2">
            <p class="text-sm text-gray-500">Already registered?</p>
            <a href="/login" class="inline-flex justify-center px-4 py-2 rounded-md border border-gray-300 text-sm font-medium text-gray-800 transition hover:bg-gray-100">Sign in</a>
        </div>
    </div>
</div>

{% endblock %}
